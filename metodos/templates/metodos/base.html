<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Métodos Numéricos{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    body { background-color: #ffffff; }
    .navbar-brand { font-weight: bold; font-size: 1.3rem; }
    .nav-link { color: rgba(255,255,255,0.85) !important; }
    .nav-link:hover { color: white !important; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .card-header { border-radius: 12px 12px 0 0 !important; }
    .formula-box { background: #f0f4ff; border-left: 4px solid #ffffff; padding: 12px 16px; border-radius: 0 8px 8px 0; font-family: monospace; font-size: 1.1rem; margin: 1rem 0; }
    .table thead th { background-color: #1a1a1a; color: hwb(25 9% 18%); }
    .badge-raiz { background: #198754; font-size: 1rem; padding: 8px 16px; border-radius: 8px; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">Métodos Numéricos</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <div class="navbar-nav ms-auto gap-2">
        <a class="nav-link" href="/">Inicio</a>
        <a class="nav-link" href="/taylor/">Taylor</a>
        <a class="nav-link" href="/newton/">Newton-Raphson</a>
        <a class="nav-link" href="/newton-mod/">NR Modificado</a>
       
      
      </div>
    </div>
  </nav>

  <div class="container py-4">
    {% block content %}{% endblock %}
  </div>

  <footer class="text-center text-muted py-3 mt-4 border-top">
    Echo por: Andrea Lopez,Yosselin Ajcu, Javier Ramirez
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
